###############手动修改##############
name: JDCloud-AX1800-Pro_AX6600-lede

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      NO_DOCKERMAN:
        description: 'Not build luci-app-dockerman'
        required: true
        default: false
        type: boolean
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
#  schedule:
#    - cron: 0 16 * * *

env:
  ###############手动修改##############
  ##手动设置上传时候的打包名称和tag名称UPLOAD_TAG_NAME
  OPENWRT_NAME: lede
  UPLOAD_TAG_NAME: jdcloud-ax1800-pro_ax6600
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: JDCloud-AX1800-Pro_AX6600/.config
  DIY_P1_SH: JDCloud-AX1800-Pro_AX6600/diy-part1.sh
  DIY_P2_SH: JDCloud-AX1800-Pro_AX6600/diy-part2.sh
  SSH_ACTIONS: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
    - name: 检查项目分支
      uses: actions/checkout@main

    # Ensure FILE_DATE has a sane default so tags won't start with a dash if compile is skipped/failed
    - name: Ensure default FILE_DATE
      run: |
        if [ -z "${FILE_DATE}" ]; then
          echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
          echo "DEBUG: Set default FILE_DATE=$FILE_DATE"
        else
          echo "DEBUG: FILE_DATE already set: $FILE_DATE"
        fi

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -yqq update
        sudo -E apt-get -yqq install curl dos2unix python3-netifaces libfuse-dev
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -yqq autoremove --purge
        sudo -E apt-get -yqq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 清理磁盘空间(Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false
        dotnet: false
        haskell: false
        large-packages: false
        swap-storage: false

    - name: 下载固件源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载feeds.conf.default & DIY_P1_SH
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 应用patch & 更新安装 feeds
      run: |
        cp JDCloud-AX1800-Pro_AX6600/jdcloud-ax1800-pro_ax6600.patch openwrt/jdcloud-ax1800-pro_ax6600.patch
        cd openwrt
        echo "DEBUG: git status before patch apply"
        git status --porcelain -b || true

        # Check patch applicability first for clearer diagnostics
        if git apply --check jdcloud-ax1800-pro_ax6600.patch; then
          echo "Patch appears to apply cleanly (git apply --check). Trying to apply..."
          if git apply --3way jdcloud-ax1800-pro_ax6600.patch; then
            echo "Patch applied with --3way"
          else
            echo "git apply --3way failed, attempting plain git apply"
            if git apply jdcloud-ax1800-pro_ax6600.patch; then
              echo "Patch applied with git apply"
            else
              echo "git apply failed after --check succeeded (unexpected)"
            fi
          fi
        else
          echo "git apply --check reported problems, attempting three-way and reject fallback"
          if git apply --3way jdcloud-ax1800-pro_ax6600.patch; then
            echo "Patch applied with --3way"
          else
            echo "git apply --3way failed, attempting git apply --reject --whitespace=fix"
            git apply --reject --whitespace=fix jdcloud-ax1800-pro_ax6600.patch || echo "git apply --reject also failed"

            if compgen -G "*.rej" > /dev/null; then
              echo "Found .rej files (patch hunks that failed):"
              ls -la *.rej || true
              for f in *.rej; do
                echo "---- $f ----"
                sed -n '1,200p' "$f" || true
              done
            else
              echo "No .rej files generated. Patch failed for other reasons."
            fi

            # If repository provides overrides, apply them as a last resort
            if [ -d "$GITHUB_WORKSPACE/JDCloud-AX1800-Pro_AX6600/overrides" ]; then
              echo "Applying overrides from repository to openwrt source..."
              cp -rv $GITHUB_WORKSPACE/JDCloud-AX1800-Pro_AX6600/overrides/* . || true
              git add -A || true
              git commit -m "ci: apply overrides for jdcloud devices" || echo "no changes to commit"
            fi

            echo "WARNING: Patch application failed or produced rejects; please inspect .rej outputs above. Continuing for now..."
          fi
        fi

        # Make feeds update/installation fail-fast so errors are visible early
        ./scripts/feeds update -a || { echo "feeds update failed"; exit 1; }
        ./scripts/feeds install -a || { echo "feeds install failed"; exit 1; }

    - name: Upload any patch reject files to logs
      if: always()
      run: |
        cd openwrt || exit 0
        if compgen -G "*.rej" > /dev/null; then
          echo "Listing .rej files:"; ls -la *.rej || true
        else
          echo "No .rej files present"
        fi

    - name: 加载config & DIY_P2_SH
      run: |
        echo "DEBUG: Checking if $CONFIG_FILE exists before moving..."
        if [ -e $CONFIG_FILE ]; then
            mv $CONFIG_FILE openwrt/.config
            echo "DEBUG: Moved $CONFIG_FILE to openwrt/.config"
        else
            echo "WARNING: Custom config file $CONFIG_FILE not found. make defconfig will generate a default one."
        fi
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 取消编译dockerman
      if: github.event.inputs.NO_DOCKERMAN == 'true'
      run: |
        cd openwrt
        sed -i '/CONFIG_PACKAGE_luci-app-dockerman=y/d' .config

    - name: SSH链接管理
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 下载安装包
      id: package
      run: |
        cd openwrt
        make defconfig
        # 显式检查 .config 文件是否存在 after defconfig
        if [ ! -f .config ]; then
          echo "ERROR: .config file was not created after make defconfig! Aborting build."
          exit 1
        fi
        echo "DEBUG: .config file found after make defconfig."
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        sed -nE 's/.*(192.168\.[0-9]+\.[0-9]+).*/\1/p' package/base-files/files/bin/config_generate | head -n 1 > IP_ADDR
        [ -s IP_ADDR ] && echo "IP_ADDR=$(cat IP_ADDR)" >> $GITHUB_ENV
        if grep -q 'CONFIG_PACKAGE_luci-app-dockerman=y' .config; then
                echo "BUILD_DOCKERMAN=-docker" >> $GITHUB_ENV
        else
                echo "BUILD_DOCKERMAN=" >> $GITHUB_ENV
        fi
        # ensure FILE_DATE is set (compile step usually sets it earlier)
        if [ -z "$FILE_DATE" ]; then
          echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
        fi
        echo "FILE_DATE=$FILE_DATE" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DEBUG: FILE_DATE in compile step: $FILE_DATE"

    - name: 查看磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 整理文件并重命名
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: | 
        echo "DEBUG: Current PWD before cd openwrt: $(pwd)"
        echo "DEBUG: Listing contents of current PWD before cd openwrt:"
        ls -la
        cd openwrt || { echo "ERROR: Could not change directory to openwrt!"; exit 1; }
        echo "DEBUG: Current PWD after cd openwrt: $(pwd)"
        echo "DEBUG: Listing openwrt directory for .config presence:"
        ls -la .config # 明确列出 .config 文件
        if [ ! -f .config ]; then # 再次检查 .config 的存在
          echo "ERROR: .config file not found in openwrt/ directory. This is critical for device detection."
          exit 1
        fi
        matched_lines=$(grep '^CONFIG_TARGET.*DEVICE_.*=y' .config | grep -v 'PER_DEVICE' | grep -v 'DEVICE_PACKAGES')
        mapfile -t devices < <(echo "$matched_lines" | sed -n 's/.*DEVICE_\([^=]*\)=y/\1/p')
        cd bin/targets/*/* || { echo "ERROR: Could not change directory to bin/targets/*/!."; exit 1; }
        rm -rf packages
        for val in "${devices[@]}"; do
                echo "Processing device: $val"
                for file in *"${val}"*; do
                        if [ -f "$file" ]; then
                                suffix="${file#*${val}}"
                                # 修正 new_name 格式，避免以连字符开头
                                new_name="${FILE_DATE}-${OPENWRT_NAME}-${val}${BUILD_DOCKERMAN}${suffix}"
                                mv "$file" "$new_name"
                                echo "  Renamed: $file -> $new_name"
                        fi
                done
        done
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 打包上传固件到Actions Artifacts
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.FILE_DATE }}-${{ env.OPENWRT_NAME }}-${{ env.UPLOAD_TAG_NAME }}${{ env.BUILD_DOCKERMAN }}
        path: ${{ env.FIRMWARE }}

    - name: 生成固件Release标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        touch release.txt
        echo "- 使用源码：${{ env.REPO_URL }}" >> release.txt
        echo "- 登录地址：${{ env.IP_ADDR }}" >> release.txt
        echo "- 注意京东云AX1800-Pro亚瑟无线AX1800规格，5G无线不支持160MHz频宽" >> release.txt
        echo "- 注意京东云AX6600雅典娜无线AX6600规格，5.8G无线不支持160MHz频宽" >> release.txt
        if [[ "${{ env.BUILD_DOCKERMAN }}" == '-docker' ]]; then
                echo "- 已编译luci-app-dockerman" >> release.txt
        else
                echo "- 未编译luci-app-dockerman" >> release.txt
        fi

        _FILE_DATE="${{ env.FILE_DATE }}"
        # 如果 FILE_DATE 为空（不应该发生，但以防万一），则使用当前日期
        if [[ -z "$_FILE_DATE" ]]; then
            _FILE_DATE=$(date +"%Y.%m.%d-%H%M")
            echo "Warning: env.FILE_DATE was empty, using current date for tag: $_FILE_DATE"
        fi

        _OPENWRT_NAME="${{ env.OPENWRT_NAME }}"
        _UPLOAD_TAG_NAME="${{ env.UPLOAD_TAG_NAME }}"
        _BUILD_DOCKERMAN="${{ env.BUILD_DOCKERMAN }}"

        # 修正：避免标签以连字符开头，添加'v'前缀作为版本号标识
        RELEASE_TAG="v${_FILE_DATE}-${_OPENWRT_NAME}-${_UPLOAD_TAG_NAME}${_BUILD_DOCKERMAN}"
        
        # 清理标签中的特殊字符，确保符合GitHub标签规范
        # GitHub标签只允许：字母、数字、点(.)、下划线(_)、连字符(-)
        RELEASE_TAG=$(echo "$RELEASE_TAG" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/-*$//')

        # Validate tag format strictly
        if [[ ! "$RELEASE_TAG" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "ERROR: RELEASE_TAG contains invalid characters: $RELEASE_TAG"
          exit 1
        fi

        echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DEBUG: Constructed RELEASE_TAG: $RELEASE_TAG"

    - name: 发布固件至Release
      uses: softprops/action-gh-release@v2.1.0
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ env.FIRMWARE }}/*
        name: ${{ steps.tag.outputs.release_tag }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
